<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>健康紀錄管理系統</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .container { background: #16213e; padding: 20px; border-radius: 10px; width: 80%; margin: auto; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-container input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
        th { background: #0f3460; }
        /* 徽章樣式 */
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; }

        /* 火箭按鈕樣式 */
        #back-to-top {
            position: fixed; bottom: 30px; right: 30px; display: none;
            background: #3498db; padding: 15px; border-radius: 50%; cursor: pointer;
            font-size: 20px; transition: 0.3s; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #back-to-top.show { display: block; }
        .rocket-launch { animation: flyUp 1s ease-in-out; }
        @keyframes flyUp { 0% { transform: translateY(0); } 100% { transform: translateY(-200vh); opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>健康紀錄管理系統</h2>
        
        <div class="search-container">
            <input type="text" id="search" placeholder="搜尋日期...">
            <button onclick="searchLogs()" style="background: #3498db;">🔍 查詢</button>
        </div>

        <input type="date" id="date">
        <input type="number" id="sleep" placeholder="睡眠時數 (0-24)">
        <input type="number" id="steps" placeholder="步數">
        <input type="number" id="mood" placeholder="心情分數 (1-10)">

        <div class="btn-group">
            <button onclick="addData()" style="background: #3498db;">+ 新增</button>
            <button onclick="updateData()" style="background: #f39c12;">- 修改</button>
            <button onclick="deleteData()" style="background: #e74c3c;">✕ 刪除</button>
            <button onclick="clearAll()" style="background: #7f8c8d;">🗑️ 清空所有</button>
        </div>

        <table>
            <thead><tr><th>ID</th><th>日期</th><th>睡眠</th><th>步數</th><th>心情</th><th>風險</th></tr></thead>
            <tbody id="log-table"></tbody>
        </table>
    </div>

    <div id="back-to-top">🚀</div>

    <script>
        // 載入所有健康紀錄
        async function load() {
            const res = await fetch(`http://localhost:3000/health-logs?t=${Date.now()}`);
            const logs = await res.json();
            const sortedLogs = logs.reverse(); // 反轉陣列，新紀錄在最上方

            document.getElementById('log-table').innerHTML = sortedLogs.map(l => {
                // 多層決策樹邏輯判定 (滿足題目 A 要求)
                let risk = "低風險";
                let color = "#27ae60"; // 綠色

                if (l.sleep_hours < 5.5) {
                    // 第一層：睡眠差 -> 看步數
                    if (l.steps < 3000) {
                        risk = "高風險"; color = "#e74c3c"; // 紅色
                    } else {
                        // 第二層：步數正常但睡眠差 -> 看心情
                        risk = (l.mood_score < 4) ? "高風險" : "中風險";
                        color = (l.mood_score < 4) ? "#e74c3c" : "#f39c12"; // 紅色或橘色
                    }
                } else if (l.sleep_hours < 7.0) {
                    // 第一層：睡眠尚可 -> 看步數
                    risk = (l.steps < 5000) ? "中風險" : "低風險";
                    color = (l.steps < 5000) ? "#f39c12" : "#27ae60"; // 橘色或綠色
                }

                return `<tr>
                    <td>${l.id}</td>
                    <td>${l.log_date}</td>
                    <td>${l.sleep_hours}</td>
                    <td>${l.steps}</td>
                    <td>${l.mood_score}</td>
                    <td><span class="badge" style="background:${color};">${risk}</span></td>
                </tr>`;
            }).join('');
        }

        // 新增健康紀錄 (加入防空與數值範圍驗證)
        async function addData() {
            const date = document.getElementById('date').value;
            const sleep = parseFloat(document.getElementById('sleep').value);
            const steps = document.getElementById('steps').value;
            const mood = document.getElementById('mood').value;

            if (!date || isNaN(sleep) || !steps || !mood) {
                alert("請完整填寫所有欄位！");
                return;
            }
            if (sleep > 24 || sleep < 0) {
                alert("睡眠時數輸入錯誤！請輸入 0 到 24 之間的數值。");
                return;
            }

            const data = { log_date: date, sleep_hours: sleep, steps: steps, mood_score: mood };
            
            const res = await fetch('http://localhost:3000/health-logs', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data)
            });

            if(res.ok) { load(); alert("新增成功！"); } else { alert("新增失敗，請檢查資料"); }
        }

        // 刪除指定 ID 的紀錄
        async function deleteData() {
            const id = prompt("輸入要刪除的 ID:");
            if(!id) return;
            await fetch(`http://localhost:3000/health-logs/${id}`, { method: 'DELETE' });
            load();
        }

        // 清空所有資料
        async function clearAll() {
            if(confirm("警告：確定要永久刪除所有紀錄嗎？")) {
                await fetch('http://localhost:3000/health-logs', { method: 'DELETE' });
                load(); 
            }
        }

        // 修改指定 ID 的紀錄
        async function updateData() {
            const id = prompt("輸入要修改的 ID:");
            if(!id) return;
            const sleep = parseFloat(document.getElementById('sleep').value);
            
            if (isNaN(sleep) || sleep > 24 || sleep < 0) {
                alert("睡眠時數輸入錯誤！請輸入 0 到 24 之間的數值。");
                return;
            }

            const data = {
                sleep_hours: sleep,
                steps: document.getElementById('steps').value,
                mood_score: document.getElementById('mood').value
            };
            
            await fetch(`http://localhost:3000/health-logs/${id}`, { 
                method: 'PUT', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data)
            });
            load();
        }

        // 搜尋紀錄功能
        function searchLogs() {
            const keyword = document.getElementById('search').value;
            const rows = document.querySelectorAll('#log-table tr');
            rows.forEach(r => r.style.display = r.innerText.includes(keyword) ? '' : 'none');
        }

        // 執行載入頁面
        load();

        // ✅ 回到頂部火箭動畫
        const backToTop = document.getElementById("back-to-top");
        window.addEventListener("scroll", () => {
            if (window.scrollY > 200) { backToTop.classList.add("show"); }
            else { backToTop.classList.remove("show"); }
        });
        backToTop.addEventListener("click", () => {
            backToTop.classList.add("rocket-launch");
            window.scrollTo({ top: 0, behavior: "smooth" });
            setTimeout(() => { backToTop.classList.remove("rocket-launch"); }, 1000);
        });
    </script>
</body>
</html>
